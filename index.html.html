<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS-LOQ v2 | Real App Control</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #06060f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
#app { background: #0a0a0f; width: 900px; min-height: 640px; border-radius: 16px; overflow: hidden; border: 1px solid #1a1a2e; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,212,255,0.05); }
#header { background: #0d0d1a; border-bottom: 1px solid #1a1a35; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.logo-text { font-size: 16px; font-weight: 700; color: #00d4ff; letter-spacing: 2px; }
.sub { font-size: 10px; color: #444; letter-spacing: 1px; margin-top: 2px; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; font-weight: 700; }
.badge-free { background: #001a0a; color: #4ade80; border: 1px solid #166534; }
.badge-gpu  { background: #1a0a2e; color: #a78bfa; border: 1px solid #4c1d95; }
.badge-conn { background: #001a0a; color: #4ade80; border: 1px solid #166534; }
.badge-disc { background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
#body { display: flex; flex: 1; height: 560px; }
#sidebar { width: 210px; background: #0d0d1a; border-right: 1px solid #1a1a35; padding: 12px 10px; overflow-y: auto; flex-shrink: 0; scrollbar-width: thin; scrollbar-color: #1a1a35 transparent; }
.sec-label { font-size: 9px; color: #333; letter-spacing: 2px; text-transform: uppercase; padding: 4px 4px 8px; }
.app-btn { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px; border: 1px solid transparent; background: transparent; cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; margin-bottom: 3px; }
.app-btn:hover { background: #141428; border-color: #2a2a50; }
.app-btn.running { background: #0d150d; border-color: #1a2a1a; }
.app-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.app-name { font-size: 11px; color: #aaa; font-family: 'Courier New', monospace; }
.app-btn.running .app-name { color: #e0e0ff; }
.app-st { font-size: 9px; color: #555; margin-top: 1px; }
.app-btn.running .app-st { color: #4ade80; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#log { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 7px; scrollbar-width: thin; scrollbar-color: #1a1a35 transparent; }
.entry { display: flex; gap: 8px; align-items: flex-start; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);} }
.etime { font-size: 10px; color: #333; min-width: 50px; padding-top: 2px; }
.etag { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 1px; min-width: 50px; text-align: center; flex-shrink: 0; }
.tag-sys { background: #0a1530; color: #60a5fa; border: 1px solid #1e3a6e; }
.tag-you { background: #1a0a2e; color: #c084fc; border: 1px solid #4c1d95; }
.tag-ai  { background: #0a2010; color: #4ade80; border: 1px solid #14532d; }
.tag-err { background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
.tag-ok  { background: #001a0a; color: #4ade80; border: 1px solid #166534; }
.etext { font-size: 13px; color: #ccc; line-height: 1.5; flex: 1; }
.etext strong { color: #00d4ff; }
#controls { padding: 14px 18px; background: #0d0d1a; border-top: 1px solid #1a1a35; display: flex; flex-direction: column; gap: 10px; }
#wavebar { height: 34px; background: #080810; border-radius: 8px; border: 1px solid #1a1a35; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
#wavebar canvas { position: absolute; top:0; left:0; }
#wavebar .idle { font-size: 11px; color: #333; letter-spacing: 2px; text-transform: uppercase; z-index: 1; }
#input-row { display: flex; gap: 8px; }
#txt { flex: 1; background: #080810; border: 1px solid #1a1a35; border-radius: 8px; color: #e0e0ff; font-family: 'Courier New', monospace; font-size: 13px; padding: 9px 13px; outline: none; }
#txt:focus { border-color: #7c3aed; }
#txt::placeholder { color: #333; }
.cbtn { padding: 9px 16px; border-radius: 8px; border: 1px solid; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
#mic { background: #0a0a15; border-color: #1a1a35; color: #666; font-size: 18px; padding: 9px 14px; }
#mic.listening { background: #1a0010; border-color: #dc2626; color: #ef4444; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}50%{box-shadow:0 0 0 6px rgba(239,68,68,0);} }
#send { background: #0a0a20; border-color: #7c3aed; color: #00d4ff; }
#send:hover { background: #150a30; }
#statbar { display: flex; align-items: center; justify-content: space-between; }
#statrow { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
.dot.ready { background: #4ade80; animation: blink 2s infinite; }
.dot.talk  { background: #ef4444; animation: blink 0.5s infinite; }
.dot.warn  { background: #f59e0b; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1;}50%{opacity:0.3;} }
#server-badge { font-size: 10px; padding: 3px 10px; border-radius: 4px; font-weight: 700; letter-spacing: 1px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1a1a35; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:12px">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#0d0d2e"/><path d="M6 14 L14 6 L22 14 L14 22 Z" fill="none" stroke="#00d4ff" stroke-width="1.5"/><circle cx="14" cy="14" r="3" fill="#7c3aed"/><line x1="14" y1="6" x2="14" y2="3" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/><line x1="14" y1="22" x2="14" y2="25" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="14" x2="3" y2="14" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/><line x1="22" y1="14" x2="25" y2="14" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/></svg>
      <div><div class="logo-text">JARVIS-LOQ v2</div><div class="sub">Lenovo LOQ · RTX 5050 · Intel Core i7 · REAL App Control</div></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="server-badge" class="badge badge-disc">⬤ SERVER OFF</span>
      <span class="badge badge-gpu">RTX 5050</span>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sec-label">click to open</div>
      <div id="applist"></div>
    </div>
    <div id="main">
      <div id="log"></div>
      <div id="controls">
        <div id="wavebar">
          <canvas id="wc" width="660" height="34"></canvas>
          <span class="idle" id="wlabel">IDLE — speak or type a command</span>
        </div>
        <div id="statbar">
          <div id="statrow"><div class="dot warn" id="dot"></div><span id="stattxt">Waiting for server... run jarvis_server.py first!</span></div>
          <span style="font-size:10px;color:#333;letter-spacing:1px">JARVIS-LOQ v2</span>
        </div>
        <div id="input-row">
          <button class="cbtn" id="mic" title="Click to speak">🎤</button>
          <input id="txt" placeholder='Say or type: "open chrome", "close discord", "shutdown", "help"...'/>
          <button class="cbtn" id="send">Send ↵</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SERVER = "http://127.0.0.1:5050";

const APPS = [
  { name:'Chrome',        icon:'🌐', bg:'#0a1520', key:'chrome' },
  { name:'Firefox',       icon:'🦊', bg:'#1a0a00', key:'firefox' },
  { name:'Notepad',       icon:'📝', bg:'#1a1a0a', key:'notepad' },
  { name:'VS Code',       icon:'💻', bg:'#0a0a1a', key:'vscode' },
  { name:'File Explorer', icon:'📁', bg:'#1a0a0a', key:'file explorer' },
  { name:'Task Manager',  icon:'📊', bg:'#0a1a0a', key:'task manager' },
  { name:'Spotify',       icon:'🎵', bg:'#0a1a10', key:'spotify' },
  { name:'Discord',       icon:'💬', bg:'#0a0a1a', key:'discord' },
  { name:'Calculator',    icon:'🔢', bg:'#100a1a', key:'calculator' },
  { name:'VLC',           icon:'🎬', bg:'#1a0a00', key:'vlc' },
  { name:'Paint',         icon:'🎨', bg:'#1a0010', key:'paint' },
  { name:'Word',          icon:'📘', bg:'#0a0a20', key:'word' },
  { name:'Excel',         icon:'📗', bg:'#0a1a00', key:'excel' },
  { name:'PowerPoint',    icon:'📙', bg:'#1a0a00', key:'powerpoint' },
  { name:'Steam',         icon:'🎮', bg:'#0a1020', key:'steam' },
  { name:'WhatsApp',      icon:'📱', bg:'#0a1a10', key:'whatsapp' },
  { name:'Zoom',          icon:'📹', bg:'#0a0a20', key:'zoom' },
  { name:'Brave',         icon:'🦁', bg:'#0a1010', key:'brave' },
  { name:'OBS',           icon:'🔴', bg:'#1a0a10', key:'obs' },
  { name:'CMD',           icon:'⬛', bg:'#0a0a0a', key:'cmd' },
];

const SYSTEM = [
  { cmds:['shutdown','shut down','turn off'],   cmd:'shutdown',  reply:'Shutting down your LOQ in 30 seconds!' },
  { cmds:['restart','reboot'],                  cmd:'restart',   reply:'Restarting in 30 seconds!' },
  { cmds:['sleep','hibernate'],                 cmd:'sleep',     reply:'Putting your LOQ to sleep!' },
  { cmds:['lock','lock pc','lock screen'],      cmd:'lock',      reply:'Screen locked!' },
  { cmds:['screenshot','take screenshot'],      cmd:'screenshot',reply:'Screenshot saved to your Desktop!' },
  { cmds:['volume up','louder','turn up'],      cmd:'volume_up', reply:'Volume up!' },
  { cmds:['volume down','quieter','turn down'], cmd:'volume_down',reply:'Volume down!' },
  { cmds:['mute'],                              cmd:'mute',      reply:'Mute toggled!' },
  { cmds:['battery','battery status'],          cmd:'battery',   reply:'Checking battery...' },
  { cmds:['ip','my ip','ip address'],           cmd:'ip',        reply:'Getting your IP address...' },
  { cmds:['flush dns','fix internet'],          cmd:'flush_dns', reply:'DNS flushed!' },
  { cmds:['clear temp','free space'],           cmd:'clear_temp',reply:'Temp files cleared!' },
  { cmds:['recycle bin','empty recycle'],       cmd:'recycle_bin',reply:'Recycle bin emptied!' },
  { cmds:['cancel shutdown','abort shutdown'],  cmd:'cancel_shutdown',reply:'Shutdown cancelled!' },
];

const FACTS = {
  'hello':'Hey! JARVIS-LOQ v2 online with REAL app control. What do you need?',
  'hi':'Hi! I can actually open and close apps now — no .bat files. Try "open chrome"!',
  'hey':'Yo! What do you need?',
  'help':'Commands: open [app], close [app], shutdown, restart, sleep, lock, screenshot, volume up/down, mute, battery, ip address, flush dns, clear temp, empty recycle bin, cancel shutdown.',
  'what can you do':'I can REALLY open and close apps on your Windows PC, plus system commands like shutdown, screenshot, battery check, and more!',
  'what apps':'Chrome, Firefox, Notepad, VS Code, File Explorer, Task Manager, Spotify, Discord, Calculator, VLC, Paint, Word, Excel, PowerPoint, Steam, WhatsApp, Zoom, Brave, OBS, CMD.',
  'specs':'Lenovo LOQ · RTX 5050 · Intel Core i7 · Windows 11. Beast mode!',
  'thank you':'No problem! That\'s what I\'m here for.',
  'thanks':'Anytime!',
  'good morning':'Good morning! LOQ is ready. What do you need?',
  'good night':'Goodnight! Want me to sleep or shut down your PC?',
};

let serverOnline = false, isListening = false, recognition = null, appEls = {}, running = new Set();
const logEl=document.getElementById('log'), txtEl=document.getElementById('txt');
const sendEl=document.getElementById('send'), micEl=document.getElementById('mic');
const statEl=document.getElementById('stattxt'), dotEl=document.getElementById('dot');
const wlabel=document.getElementById('wlabel'), sbadge=document.getElementById('server-badge');
const canvas=document.getElementById('wc'), ctx=canvas.getContext('2d');
let waveAnim=null;

function ts(){return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function log(tag,cls,html){
  const d=document.createElement('div'); d.className='entry';
  d.innerHTML=`<span class="etime">${ts()}</span><span class="etag ${cls}">${tag}</span><span class="etext">${html}</span>`;
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight;
}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.05; u.pitch=0.88; u.volume=1;
  window.speechSynthesis.speak(u);
}
function setRunning(name,on){
  const b=appEls[name]; if(!b)return;
  const s=document.getElementById('ast_'+name);
  if(on){b.classList.add('running');if(s)s.textContent='● running';running.add(name);}
  else{b.classList.remove('running');if(s)s.textContent='idle';running.delete(name);}
}

async function api(endpoint, body){
  const res = await fetch(SERVER + endpoint, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return res.json();
}

async function checkServer(){
  try {
    const res = await fetch(SERVER + '/ping');
    const data = await res.json();
    if(data.status === 'ok'){
      if(!serverOnline){
        serverOnline = true;
        sbadge.textContent = '⬤ SERVER ON';
        sbadge.className = 'badge badge-conn';
        dotEl.className = 'dot ready';
        statEl.textContent = 'Connected — REAL app control active!';
        log('SYS','tag-sys','Server connected! JARVIS can now <strong>actually open and close apps</strong> on your LOQ!');
        speak('Server connected. I can now really control your apps!');
      }
    }
  } catch(e){
    if(serverOnline){
      serverOnline = false;
      sbadge.textContent = '⬤ SERVER OFF';
      sbadge.className = 'badge badge-disc';
      dotEl.className = 'dot warn';
      statEl.textContent = 'Server offline — run jarvis_server.py!';
    }
  }
}

async function process(raw){
  const input = raw.trim(); if(!input) return;
  log('YOU','tag-you',`"${input}"`);
  const t = input.toLowerCase();

  // Facts / chitchat
  for(const[key,reply] of Object.entries(FACTS)){
    if(t.includes(key)){ log('AI','tag-ai',reply); speak(reply); return; }
  }

  if(!serverOnline){
    const msg = 'The Python server is not running! Open a terminal, navigate to the folder, and run: <strong>python jarvis_server.py</strong>';
    log('ERR','tag-err', msg);
    speak('The server is not running. Please start it first.');
    return;
  }

  const isOpen  = /\b(open|launch|start|run|load)\b/.test(t);
  const isClose = /\b(close|exit|kill|quit|stop|end)\b/.test(t);

  if(isOpen || isClose){
    for(const app of APPS){
      if(t.includes(app.key) || t.includes(app.name.toLowerCase())){
        if(isOpen){
          log('AI','tag-ai',`Opening <strong>${app.name}</strong>...`);
          speak(`Opening ${app.name}`);
          const r = await api('/open', {app: app.key});
          if(r.success){ log('OK','tag-ok', r.message); setRunning(app.name, true); }
          else log('ERR','tag-err', r.message);
          return;
        }
        if(isClose){
          log('AI','tag-ai',`Closing <strong>${app.name}</strong>...`);
          speak(`Closing ${app.name}`);
          const r = await api('/close', {app: app.key});
          if(r.success){ log('OK','tag-ok', r.message); setRunning(app.name, false); }
          else log('ERR','tag-err', r.message);
          return;
        }
      }
    }
  }

  // System commands
  for(const sc of SYSTEM){
    if(sc.cmds.some(c => t.includes(c))){
      log('AI','tag-ai', sc.reply); speak(sc.reply);
      const r = await api('/system', {cmd: sc.cmd});
      if(r.message && r.message !== sc.reply) log('OK','tag-ok', r.message);
      return;
    }
  }

  // Fallback
  const fb = [
    'I did not catch that. Try: "open chrome", "close discord", "shutdown", or say "help".',
    'Not sure what you mean. Say "help" to see all commands!',
    'Try "open [app name]" or "close [app name]". Say "help" for everything I can do.',
  ];
  const r = fb[Math.floor(Math.random()*fb.length)];
  log('AI','tag-ai', r); speak(r);
}

function startWave(){
  wlabel.style.display='none'; let t=0;
  function draw(){
    t+=0.08; ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5; ctx.beginPath();
    for(let x=0;x<canvas.width;x++){
      const y=17+Math.sin(x*0.04+t)*7*Math.abs(Math.sin(x*0.015+t*0.6))+Math.sin(x*0.09+t*1.4)*3;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); waveAnim=requestAnimationFrame(draw);
  }
  draw();
}
function stopWave(){
  if(waveAnim){cancelAnimationFrame(waveAnim);waveAnim=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  wlabel.style.display=''; wlabel.textContent='IDLE — speak or type a command';
}

function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){log('ERR','tag-err','Use <strong>Chrome or Edge</strong> for voice control!');return;}
  recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  recognition.onstart=()=>{isListening=true;micEl.classList.add('listening');wlabel.textContent='🎤 LISTENING...';startWave();statEl.textContent='Listening — speak now!';};
  recognition.onresult=(e)=>{
    let text='';
    for(let i=e.resultIndex;i<e.results.length;i++) text+=e.results[i][0].transcript;
    txtEl.value=text;
    if(e.results[e.results.length-1].isFinal){stopWave();recognition.stop();process(text);txtEl.value='';}
  };
  recognition.onerror=(e)=>{log('ERR','tag-err','Mic error: '+e.error+'. Allow mic access in Chrome!');isListening=false;micEl.classList.remove('listening');stopWave();};
  recognition.onend=()=>{isListening=false;micEl.classList.remove('listening');stopWave();if(serverOnline)statEl.textContent='Ready — REAL app control active!';};
}

function buildApps(){
  const el=document.getElementById('applist');
  APPS.forEach(a=>{
    const b=document.createElement('button'); b.className='app-btn'; b.id='ab_'+a.name;
    b.innerHTML=`<div class="app-icon" style="background:${a.bg}">${a.icon}</div><div><div class="app-name">${a.name}</div><div class="app-st" id="ast_${a.name}">idle</div></div>`;
    b.onclick=()=>process('open '+a.name.toLowerCase());
    el.appendChild(b); appEls[a.name]=b;
  });
}

micEl.onclick=()=>{
  if(!recognition){initVoice();if(!recognition)return;}
  if(isListening)recognition.stop(); else recognition.start();
};
sendEl.onclick=()=>{const v=txtEl.value.trim();if(v){process(v);txtEl.value='';}};
txtEl.onkeydown=(e)=>{if(e.key==='Enter')sendEl.onclick();};

buildApps();
log('SYS','tag-sys','JARVIS-LOQ v2 loaded — <strong>REAL app control mode!</strong>');
log('SYS','tag-sys','Step 1: Run <strong>jarvis_server.py</strong> in terminal. Step 2: Come back here and talk!');

checkServer();
setInterval(checkServer, 3000); // Auto-reconnect every 3 seconds
initVoice();
</script>
</body>
</html>
